<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live TV</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

.player{
width:900px;
height:500px;
margin:auto;
}

iframe{
width:100%;
height:100%;
border:none;
background:black;
}

.channel-list{
margin-top:20px;
}

.btn{
cursor:pointer;
border:none;
width:140px;
height:100px;
background-size:cover;
background-position:center;
}

</style>
</head>

<body>

<div class="player">
<iframe id="player"></iframe>
</div>

<div class="channel-list">

<input class="btn"
style="background-image:url(https://img.inwiptv.net/postor/20240418191023mono29.jpg);"
onclick="playStream('https://live-new2.vercel.app/')">

</div>

<script>

function playStream(url){
document.getElementById("player").src = url;
}

</script>

</body>
</html>
