<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
}

.player{
width:800px;
margin:auto;
padding:20px;
}

video{
width:100%;
background:black;
}

.channel-list{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.movie{
width:140px;
}

.btn{
cursor:pointer;
border:none;
}

</style>
</head>

<body>

<div class="player">
<video id="video" controls autoplay></video>
</div>

<div class="channel-list">

<div class="movie col-4 col-md-3 col-xl-2">
<div class="movie-box">
<input class="btn" type="button"
style="background-size:cover;
background-image:url(https://img.inwiptv.net/postor/20240418191023mono29.jpg);
width:140px;height:100.45px;background-position:center;"
onclick="playStream('https://playidtv24.vercel.app/stream/3bbtv/mono29.html')">
</div>
</div>

<div class="movie col-4 col-md-3 col-xl-2">
<div class="movie-box">
<input class="btn" type="button"
style="background-size:cover;
background-image:url(https://img.inwiptv.net/postor/20240418191023mono29.jpg);
width:140px;height:100.45px;background-position:center;"
onclick="playStream('https://playidtv24.vercel.app/stream/3bbtv/mono29.html')">
</div>
</div>

</div>

<script>

var video = document.getElementById('video');
var hls;

function playStream(url){

if(Hls.isSupported()){

if(hls){
hls.destroy();
}

hls = new Hls();
hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){
video.play();
});

}
else if(video.canPlayType('application/vnd.apple.mpegurl')){
video.src = url;
video.play();
}

}

</script>

</body>
</html>
