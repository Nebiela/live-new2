<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>M3U8 Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
body{
  background:#000;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
video{
  width:90%;
  max-width:900px;
}
</style>
</head>
<body>

<video id="video" controls autoplay></video>

<script>
var video = document.getElementById('video');
var videoSrc = "http://195.128.27.141:80/play/live.php?mac=00:1A:79:24:1B:18&stream=1776086&extension=m3u8";

if (Hls.isSupported()) {
  var hls = new Hls();
  hls.loadSource(videoSrc);
  hls.attachMedia(video);
} 
else if (video.canPlayType('application/vnd.apple.mpegurl')) {
  video.src = videoSrc;
}
</script>

</body>
</html>
